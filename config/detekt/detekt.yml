# KMP CloudSync Engine — Detekt Configuration

build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1

processors:
  active: true
  exclude:
    - 'FunctionCountProcessor'
    - 'PropertyCountProcessor'
    - 'ClassCountProcessor'
    - 'PackageCountProcessor'
    - 'KtFileCountProcessor'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedInfoReport'

output-reports:
  active: true
  exclude:
    - 'XmlOutputReport'

comments:
  active: true
  excludes: ['**/test/**', '**/commonTest/**']
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  EndOfSentenceFormat:
    active: false
  UndocumentedPublicClass:
    active: true
    excludes: ['**/test/**']
  UndocumentedPublicFunction:
    active: true
    excludes: ['**/test/**']

complexity:
  active: true
  ComplexCondition:
    threshold: 4
  CyclomaticComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
  MethodOverloading:
    active: false
  TooManyFunctions:
    thresholdInFiles: 11
    thresholdInClasses: 11
    thresholdInInterfaces: 11
    thresholdInObjects: 11
    thresholdInEnums: 11

coroutines:
  active: true
  GlobalCoroutineScope:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunSwallowedCancellation:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    allowedExceptionNames: ['Exception']

naming:
  active: true
  FunctionNaming:
    active: true
    excludes: ['**/test/**']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: true
  CouldBeSequence:
    active: true
    excludes: ['**/test/**']
  ForEachOnRange:
    active: true
  UnnecessaryPartOfBinaryExpression:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  Deprecation:
    active: true
  DontDowncastCollectionType:
    active: true
  IgnoredReturnValue:
    active: true
  ImplicitDefaultLocale:
    active: true
  ImplicitUnitReturnType:
    active: false
  MapNotNullCheck:
    active: true
  MissingPackageDeclaration:
    active: true
  NullCheckOnMutableProperty:
    active: true
  UnreachableCatchBlock:
    active: true
  UnreachableCode:
    active: true
  UnusedUnaryOperator:
    active: true
  UselessPostfixExpression:
    active: true

style:
  active: true
  ForbiddenComment:
    values:
      - 'STOPSHIP'
      - '@author'
      - 'FIXME:'
      - 'HACK:'
      - 'TODO:'
      - 'todo:'
  MagicNumber:
    active: true
    excludes: ['**/test/**']
    ignoreNumbers: ['0', '1', '-1', '100', '1000', '1024']
  MaxLineLength:
    maxLineLength: 120
    excludes: ['**/test/**']
  MayBeConst:
    active: true
  ReturnCount:
    active: true
    max: 3
    excludedFunctions: ['equals', 'hashCode', 'toString']
  SpacingBetweenPackageAndImports:
    active: true
  ThrowsCount:
    active: true
    max: 2
  UnusedImports:
    active: true
  UnusedParameter:
    active: true
    allowedNames: 'ignored|expected'
  UseCheckOrError:
    active: true
  UseRequire:
    active: true
