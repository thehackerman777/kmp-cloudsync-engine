name: Nightly — Scheduled Build & Security Scan

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  build:
    name: Full Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assemble --no-daemon

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Check Dependencies with OWASP DC
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'KMP CloudSync Engine'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 9
            --suppression suppression.xml

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check/

  stale-check:
    name: Check Stale Issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been inactive for 30 days. Please update or it will be closed.'
          stale-pr-message: 'This PR has been inactive for 14 days. Please update or it will be closed.'
          days-before-stale: 30
          days-before-close: 7
