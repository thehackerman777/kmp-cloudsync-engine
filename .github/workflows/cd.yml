name: CD — Continuous Delivery


on:
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true
  JAVA_VERSION: '17'
  ANDROID_HOME: /home/ubuntu/android-sdk

jobs:
  build-and-upload:
    name: Build & Upload Artifacts
    runs-on: [self-hosted, linux, x64, dev-vps]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop JARs
        continue-on-error: true
        run: |
          ./gradlew :core:common:desktopJar :domain:desktopJar :network:desktopJar \
            :auth:desktopJar :storage:desktopJar :data:desktopJar :sync:desktopJar \
            :presentation:desktopJar --no-daemon || echo "Desktop JARs: non-blocking"

      - name: Build Android AARs
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts/jars artifacts/aars
          find . -path '*/build/libs/*.jar' -exec cp {} artifacts/jars/ \;
          find . -path '*/build/outputs/aar/*.aar' -exec cp {} artifacts/aars/ \;
          ls -la artifacts/jars/ artifacts/aars/
          echo "ARTIFACTS_COUNT=$(find artifacts -type f | wc -l)" >> $GITHUB_ENV

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 90

  release:
    name: Create Release with Artifacts
    needs: build-and-upload
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            echo 'changelog<<EOF' >> $GITHUB_OUTPUT
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
            echo '' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 KMP CloudSync Engine ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Artifacts
            - 📱 **Android AARs** — Integrate into Android projects
            - 🖥️ **Desktop JARs** — For JVM-based projects
            - 🌐 **Source code** — Zip and tar.gz below

            ### ⚡ Gradle
            ```kotlin
            repositories { mavenCentral() }
            dependencies {
                implementation("io.cloudsync:kmp-cloudsync-engine:${{ github.ref_name }}")
            }
            ```

            ### 📚 Docs
            - [Architecture](docs/ARCHITECTURE.md)
            - [Security](docs/SECURITY.md)
            - [README español](README.es.md)
          files: |
            release-artifacts/jars/*.jar
            release-artifacts/aars/*.aar
          draft: false
          prerelease: false
          generate_release_notes: true
