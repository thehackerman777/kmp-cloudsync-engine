name: CI — Pull Request Validation

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false
  JAVA_VERSION: '17'

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Detekt
        run: ./gradlew detekt --no-daemon
      - name: API Check
        run: ./gradlew apiCheck --no-daemon

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Run all tests
        run: ./gradlew allTests --no-daemon

  build:
    name: Compile All Targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile Android
        run: ./gradlew :engine:compileReleaseKotlinAndroid --no-daemon
      - name: Compile Desktop
        run: ./gradlew :engine:compileKotlinDesktop --no-daemon
      - name: Compile Web
        run: ./gradlew :engine:jsBrowserProductionWebpack --no-daemon
