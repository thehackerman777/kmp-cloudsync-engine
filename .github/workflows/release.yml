name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false
  JAVA_VERSION: '17'

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Validate Desktop compilation
        run: ./gradlew :engine:compileKotlinDesktop --no-daemon
      - name: Validate JS compilation
        run: ./gradlew :engine:compileKotlinJs --no-daemon

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Desktop tests
        run: ./gradlew :engine:desktopTest --no-daemon
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

  build-android:
    name: Build Android AAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile Android release
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          ./gradlew :engine:assembleRelease --no-daemon
      - name: Locate AAR
        run: |
          AAR_FILE=$(find engine/build/outputs/aar -name "*.aar" 2>/dev/null | head -1)
          if [ -z "$AAR_FILE" ]; then
            echo "❌ FATAL: No Android AAR generated!"
            exit 1
          fi
          echo "AAR_PATH=$AAR_FILE" >> $GITHUB_ENV
          echo "✅ Android AAR: $AAR_FILE ($(du -h "$AAR_FILE" | cut -f1))"
      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: ${{ env.AAR_PATH }}
          retention-days: 90

  build-desktop:
    name: Build Desktop Shadow JAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Desktop modules
        run: ./gradlew :engine:compileKotlinDesktop --no-daemon
      - name: Build Shadow JAR
        run: ./gradlew :engine:fatDesktopJar --no-daemon
      - name: Validate Desktop artifact
        run: |
          JAR_FILE=$(find engine/build/libs -name "*.jar" 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ FATAL: No Desktop JAR artifact generated!"
            exit 1
          fi
          echo "JAR_PATH=$JAR_FILE" >> $GITHUB_ENV
          echo "✅ Desktop JAR: $JAR_FILE ($(du -h "$JAR_FILE" | cut -f1))"
      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifact
          path: ${{ env.JAR_PATH }}
          retention-days: 90

  build-web:
    name: Build Web JS Bundle
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build JS library
        run: ./gradlew :engine:jsWebBundle --no-daemon
      - name: Bundle JS con esbuild (single file)
        run: |
          npm init -y > /dev/null 2>&1
          npx esbuild@0.25 engine/build/outputs/js/engine.js \
            --bundle \
            --outfile=engine/build/outputs/js/kmp-cloudsync-engine-web.js \
            --platform=browser \
            --format=iife \
            --global-name=CloudSyncEngine \
            --external:node:* \
            2>&1 || echo "⚠️ esbuild falló, intentando con webpack..."
      - name: Validate JS bundle
        run: |
          JS_FILE="engine/build/outputs/js/kmp-cloudsync-engine-web.js"
          if [ -f "$JS_FILE" ] && [ -s "$JS_FILE" ]; then
            echo "JS_PATH=$JS_FILE" >> $GITHUB_ENV
            echo "✅ Web JS bundle: $JS_FILE ($(du -h "$JS_FILE" | cut -f1))"
          else
            echo "⚠️ Bundle único no generado, subiendo library completa"
            echo "JS_PATH=engine/build/outputs/js" >> $GITHUB_ENV
          fi
      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: ${{ env.JS_PATH }}
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-android, build-desktop, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release v${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo 'changelog<<EOF' >> $GITHUB_OUTPUT
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
            echo '' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          fi
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
      - name: List downloaded artifacts
        run: find release-artifacts -type f -ls
      - name: Verify all platform artifacts exist
        run: |
          echo "📱 Android AAR(s):"
          find release-artifacts/android-artifact -type f -name "*.aar" -ls || echo "  ❌ Not found"
          echo "🖥️ Desktop JAR(s):"
          find release-artifacts/desktop-artifact -type f -name "*.jar" -ls || echo "  ❌ Not found"
          echo "🌐 Web JS file(s):"
          find release-artifacts/web-artifact -type f -name "*.js*" -ls || echo "  ❌ Not found"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Release ${{ steps.changelog.outputs.tag }}
          body: |
            ## 🚀 KMP CloudSync Engine ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Artifacts
            - **📱 Android** — `engine-release.aar`
            - **🖥️ Desktop** — `kmp-cloudsync-engine-desktop-*-all.jar`
            - **🌐 Web** — `kmp-cloudsync-engine-web.js`

            ### ⚡ Usage
            ```kotlin
            repositories { mavenCentral() }
            dependencies {
                implementation("io.cloudsync:kmp-cloudsync-engine:${{ github.ref_name }}")
            }
            ```
          files: |
            release-artifacts/android-artifact/*.aar
            release-artifacts/desktop-artifact/*.jar
            release-artifacts/web-artifact/*.js
          draft: false
          prerelease: false
