name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false
  JAVA_VERSION: '17'
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Validate Desktop compilation
        run: ./gradlew :engine:compileKotlinDesktop --no-daemon
      - name: Validate JS compilation
        run: ./gradlew :engine:compileKotlinJs --no-daemon

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Desktop tests
        run: ./gradlew :engine:desktopTest --no-daemon
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

  build-android:
    name: Build Android AAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=\$ANDROID_HOME"
          ls "\$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
          ls "\$ANDROID_HOME/build-tools/" 2>/dev/null || echo "No build-tools dir"
          # Accept licenses and install required platform
          yes | "\$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          "\$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" 2>&1 || echo "SDK install optional"
          echo "sdk.dir=\$ANDROID_HOME" > local.properties
          cat local.properties
      - name: Build Android AAR
        run: ./gradlew :engine:assembleRelease --no-daemon
      - name: Validate Android artifact
        run: |
          AAR_FILE=$(find engine/build/outputs -name "*.aar" 2>/dev/null | head -1)
          if [ -z "$AAR_FILE" ]; then
            echo "❌ FATAL: No Android AAR artifact generated!"
            exit 1
          fi
          echo "✅ Android AAR: $AAR_FILE ($(du -h "$AAR_FILE" | cut -f1))"
      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: engine/build/outputs/aar/*.aar
          retention-days: 90

  build-desktop:
    name: Build Desktop Shadow JAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Desktop modules
        run: ./gradlew :engine:compileKotlinDesktop --no-daemon
      - name: Build Shadow JAR
        run: ./gradlew :engine:fatDesktopJar --no-daemon
      - name: Validate Desktop artifact
        run: |
          JAR_FILE=$(find engine/build/libs -name "*.jar" 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ FATAL: No Desktop JAR artifact generated!"
            exit 1
          fi
          echo "✅ Desktop JAR found: $JAR_FILE ($(du -h "$JAR_FILE" | cut -f1))"
      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifact
          path: engine/build/libs/kmp-cloudsync-engine-desktop-*.jar
          retention-days: 90

  build-web:
    name: Build Web JS Bundle
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build JS modules
        run: ./gradlew :engine:jsNodeProductionLibraryDistribution --no-daemon
      - name: Bundle JS standalone
        run: ./gradlew :engine:jsStandaloneBundle --no-daemon
      - name: Validate JS artifact
        run: |
          JS_FILE=$(find engine/build/outputs/js -name "*.js" 2>/dev/null | head -1)
          if [ -z "$JS_FILE" ]; then
            echo "❌ FATAL: No Web JS artifact generated!"
            exit 1
          fi
          echo "✅ Web JS bundle found: $JS_FILE ($(du -h "$JS_FILE" | cut -f1))"
      - name: Upload JS bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: engine/build/outputs/js/*.js
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-android, build-desktop, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release v${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo 'changelog<<EOF' >> $GITHUB_OUTPUT
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
            echo '' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          fi
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List downloaded artifacts
        run: find release-artifacts -type f -ls

      - name: Verify all platform artifacts exist
        run: |
          ANDROID_COUNT=$(find release-artifacts/android-artifact -name "*.aar" | wc -l)
          DESKTOP_COUNT=$(find release-artifacts/desktop-artifact -name "*.jar" | wc -l)
          WEB_COUNT=$(find release-artifacts/web-artifact -name "*.js" | wc -l)

          echo "📱 Android AARs: $ANDROID_COUNT"
          echo "🖥️ Desktop JARs: $DESKTOP_COUNT"
          echo "🌐 Web JS: $WEB_COUNT"

          if [ "$ANDROID_COUNT" -eq 0 ] || [ "$DESKTOP_COUNT" -eq 0 ] || [ "$WEB_COUNT" -eq 0 ]; then
            echo "❌ FATAL: Missing platform artifacts!"
            exit 1
          fi
          echo "✅ All platform artifacts present"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Release ${{ steps.changelog.outputs.tag }}
          body: |
            ## 🚀 KMP CloudSync Engine ${{ steps.changelog.outputs.tag }}

            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Artifacts

            - **📱 Android** — `kmp-cloudsync-engine-android-*.aar` (Fat AAR — single dependency)
            - **🖥️ Desktop** — `kmp-cloudsync-engine-desktop-*-all.jar` (Shadow JAR — single dependency)
            - **🌐 Web** — `kmp-cloudsync-engine-*.js` (Standalone JS bundle)

            ### ⚡ Usage

            **Android / Desktop / Web:**
            ```kotlin
            repositories { mavenCentral() }
            dependencies {
                implementation("io.cloudsync:kmp-cloudsync-engine:${{ github.ref_name }}")
            }
            ```

            **Direct download (no build tool):**
            - Download the platform-specific artifact from Assets below
            - **Desktop:** Add the shadow JAR to your classpath
            - **Web:** Include the JS bundle via `<script>` tag in your HTML

            ### 📚 Docs
            - [Architecture](docs/ARCHITECTURE.md)
            - [Security](docs/SECURITY.md)
            - [README español](README.es.md)
          files: |
            release-artifacts/android-artifact/*.aar
            release-artifacts/desktop-artifact/*.jar
            release-artifacts/web-artifact/*.js
          draft: false
          prerelease: false
