name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
      - 'refactor'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
  - title: '⚠️ Breaking Changes'
    labels:
      - 'breaking'
change-template: '- $TITLE (@$AUTHOR)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'chore'
      - 'dependencies'
  default: patch
template: |
  ## What's Changed

  $CHANGES

  ## 📦 Artifacts

  - Android: `io.cloudsync:kmp-cloudsync-engine-android:$RESOLVED_VERSION`
  - Desktop: `io.cloudsync:kmp-cloudsync-engine-desktop:$RESOLVED_VERSION`
  - JS: `@cloudsync/kmp-cloudsync-engine@$RESOLVED_VERSION`

  ## 📝 Full Changelog

  https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
